ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true  # Indispensable pour Eurobot (on ignore Z, roll, pitch)
    print_diagnostics: true
    publish_tf: true

    # Repères
    map_frame: map              
    odom_frame: odom            
    base_link_frame: base_link  
    world_frame: map           # L'EKF publiera le lien map -> odom

    # Configuration de l'Odométrie (Roues)
    # [x, y, z, 
    #  roll, pitch, yaw, 
    #  vx, vy, vz, 
    #  vroll, vpitch, vyaw, 
    #  ax, ay, az]
    odom0: /eirbot_base_controller/odom
    odom0_config: [false, false, false, # Position (souvent dérivée, on préfère les vitesses)
                  false, false, false,
                  true,  true,  false, # On prend les vitesses linéaires VX, VY
                  false, false, true,  # On prend la vitesse angulaire VYAW
                  false, false, false]
    odom0_relative: false

    # Configuration des Balises / Pose manuelle (ex: recalage ToF ou RViz)
    pose0: /initialpose
    pose0_config: [true,  true,  false, # On prend X et Y
                   false, false, true,  # On prend le Yaw
                   false, false, false,
                   false, false, false,
                   false, false, false]
    pose0_rejection_threshold: 2.0