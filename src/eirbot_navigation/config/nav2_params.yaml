bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_link
    odom_frame: odom
    service_timeout: 2.0
    default_bt_xml_filename: "package://eirbot_navigation/config/navigate_to_pose.xml"
    plugin_lib_names:
    - nav2_back_up_action_bt_node
    - nav2_spin_action_bt_node
    - nav2_wait_action_bt_node
    - nav2_clear_costmap_service_bt_node
    - nav2_is_stuck_condition_bt_node
    - nav2_goal_reached_condition_bt_node
    - nav2_goal_updated_condition_bt_node
    - nav2_initial_pose_received_condition_bt_node
    - nav2_reinitialize_global_localization_service_bt_node
    - nav2_rate_controller_bt_node
    - nav2_distance_controller_bt_node
    - nav2_speed_controller_bt_node
    - nav2_truncate_path_action_bt_node
    - nav2_truncate_path_local_action_bt_node
    - nav2_remove_passed_goals_action_bt_node
    - nav2_planner_selector_bt_node
    - nav2_controller_selector_bt_node
    - nav2_goal_checker_selector_bt_node
    - nav2_recovery_node_bt_node
    - nav2_pipeline_sequence_bt_node
    - nav2_round_robin_node_bt_node     
    - nav2_transform_available_condition_bt_node
    - nav2_time_expired_condition_bt_node
    - nav2_distance_traveled_condition_bt_node
    - nav2_compute_path_to_pose_action_bt_node
    - nav2_compute_path_through_poses_action_bt_node
    - nav2_follow_path_action_bt_node
    - nav2_navigate_to_pose_action_bt_node
    - nav2_navigate_through_poses_action_bt_node

    - push_action_bt_node_lib
 
controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 35.0
    expected_controller_frequency: 35.0
    control_patience: 10.0
    min_x_velocity_threshold: 0.005
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.005
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.35
      movement_time_allowance: 10.0
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.01
      yaw_goal_tolerance: 1.54
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.7
      max_linear_accel: 1.5
      max_angular_accel: 90.0
      max_angular_velocity: 30.0
      lookahead_dist: 0.25
      min_lookahead_dist: 0.25
      max_lookahead_dist: 0.50
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 30.0
      transform_tolerance: 0.3
      use_velocity_scaled_lookahead_dist: true
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.3
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 0.5
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.1
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 0.3
      cost_scaling_gain: 0.8
      low_curv_threshold: 0.3
      rotate_to_heading_min_angle: 0.7
      max_robot_pose_search_dist: 10.0

planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    global_frame: map
    robot_base_frame: base_link
    transform_timeout: 0.1
    use_sim_time: False
    simulate_ahead_time: 2.0
    max_rotational_vel: 6.0
    min_rotational_vel: 0.4
    rotational_accel: 10.2

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 0.5
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: False
      footprint: "[[0.13, 0.15], [0.13, -0.15], [-0.13, -0.15], [-0.13, 0.15]]"  #robot_radius: 0.25 # Adjust for your Eurobot
      resolution: 0.01
      track_unknown_space: false
      plugins: ["static_layer",  "virtual_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        enabled: True

      virtual_layer:
        plugin: "nav2_virtual_layer::VirtualLayer"
        enabled: true
        map_frame: map
        default_cost_level: 254
        forms_file: "package://eirbot_navigation/config/virtual_layer_forms.yaml"

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.35

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: False
      rolling_window: true
      width: 2
      height: 2
      resolution: 0.05
      track_unknown_space: false
      footprint: "[[0.13, 0.15], [0.13, -0.15], [-0.13, -0.15], [-0.13, 0.15]]"  #robot_radius: 0.25 # Adjust for your Eurobot
      plugins: ["virtual_layer", "obstacle_layer", "inflation_layer"]
      
      virtual_layer:
        plugin: "nav2_virtual_layer::VirtualLayer"
        enabled: false
        map_frame: map
        enable_visualization: true
        default_cost_level: 254
        forms_file: "package://eirbot_navigation/config/virtual_layer_forms.yaml"

      obstacle_layer: # TODO : make this subscribe to scan to detect enemy robot
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: false
        observation_sources: virtual_obstacles

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        inflation_radius: 0.35 # TODO : make this larger than the robot radius to ensure safety

map_server:
  ros__parameters:
    yaml_filename: "eurobot_table.yaml" # Or the full path if not handled by launch 

